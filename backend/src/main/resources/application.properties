quarkus.datasource.db-kind=oracle
quarkus.datasource.username=${DBUSERNAME}
quarkus.datasource.password=${DBPASSWD}
quarkus.datasource.jdbc.url=${JDBCURL}
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.forwarded-host-header=X-Forwarded-Host
quarkus.swagger-ui.path=/swagger
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=https://autoflex.thalesleal.icu,http://localhost:8080,http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
